services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-dashboard-alerts-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: webhook_dashboard_alerts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d webhook_dashboard_alerts"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
